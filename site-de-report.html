function buildTable(sheet, content) {
  const headers = content.headers;
  const rows = content.rows;
  
  let thead = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
  
  let tbody = rows.map(row => {
    let cls = '';
    if (sheet === '手動比對_全部') {
      const child = row[4]?.value;
      const status = row[7]?.value || '';
      if (child === '⚠️') cls = 'row-child';
      else if (status.includes('漏掉')) cls = 'row-miss';
      else cls = 'row-ok';
    } else if (sheet === '⚠️兒少性剝削') {
      cls = 'row-child';
    }
    
    const cells = row.map(cell => {
      const val = cell.value || '';
      const link = cell.hyperlink;
      if (link && val) {
        return `<td><a href="${link}" target="_blank">${val}</a></td>`;
      }
      return `<td>${val}</td>`;
    }).join('');
    
    return `<tr class="${cls}">${cells}</tr>`;
  }).join('');
  
  return `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}
