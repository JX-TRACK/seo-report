<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADE-ANS 域名蒐證查詢系統</title>
<style>
  :root {
    --navy: #1F3864;
    --navy-light: #2c4f8a;
    --red: #C00000;
    --green: #375623;
    --green-light: #E2EFDA;
    --red-light: #FCE4D6;
    --gray-bg: #F2F4F8;
    --border: #CBD0DA;
    --text: #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, 'Microsoft JhengHei', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header .logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #7ec8e3;
  }
  header .subtitle {
    font-size: 13px;
    color: #aac4e0;
    margin-top: 2px;
  }
  header .dbcount {
    margin-left: auto;
    background: rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    color: #cde;
  }
  header .dbcount span {
    font-size: 20px;
    font-weight: bold;
    color: #7ec8e3;
  }

  .main { max-width: 860px; margin: 36px auto; padding: 0 16px; }

  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(31,56,100,0.10);
    padding: 28px 32px;
    margin-bottom: 24px;
  }

  .card h2 {
    font-size: 15px;
    color: var(--navy);
    margin-bottom: 14px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  textarea {
    width: 100%;
    height: 110px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text);
  }
  textarea:focus { border-color: var(--navy-light); }
  .hint { font-size: 12px; color: #888; margin-top: 6px; }

  .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  button {
    padding: 10px 28px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }
  #btnCheck {
    background: var(--navy);
    color: #fff;
  }
  #btnCheck:hover { background: var(--navy-light); }
  #btnClear {
    background: #e8eaf0;
    color: #555;
  }
  #btnClear:hover { background: #d0d4e0; }

  /* Results */
  #results { display: none; }
  .summary-bar {
    display: flex;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .stat {
    background: #fff;
    border-radius: 8px;
    padding: 12px 20px;
    box-shadow: 0 1px 6px rgba(31,56,100,0.08);
    text-align: center;
    flex: 1;
    min-width: 100px;
  }
  .stat .num { font-size: 28px; font-weight: bold; }
  .stat .lbl { font-size: 12px; color: #888; margin-top: 2px; }
  .stat.hit .num { color: var(--red); }
  .stat.miss .num { color: var(--green); }
  .stat.total .num { color: var(--navy); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead tr { background: var(--navy); color: #fff; }
  th { padding: 10px 12px; text-align: left; font-weight: bold; }
  tbody tr { border-bottom: 1px solid #eef0f5; transition: background 0.1s; }
  tbody tr:hover { background: #f5f7fc; }
  td { padding: 9px 12px; vertical-align: middle; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
  }
  .badge.hit { background: var(--red-light); color: var(--red); }
  .badge.miss { background: var(--green-light); color: var(--green); }

  .domain-cell { font-family: 'Courier New', monospace; font-size: 13px; }
  .tld-pill {
    display: inline-block;
    background: #eaf0fb;
    color: var(--navy);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    margin-left: 4px;
  }
  .reg-text { color: #666; font-size: 12px; }
  .date-text { color: #666; font-size: 12px; white-space: nowrap; }

  .input-url { font-family: 'Courier New', monospace; font-size: 12px; color: #555; word-break: break-all; }

  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: #aaa;
    font-size: 14px;
  }
</style>
</head>

// Build lookup map
const DOMAIN_MAP = {};
for (const r of DB) {
  DOMAIN_MAP[r.domain.toLowerCase()] = r;
}

function extractDomain(input) {
  input = input.trim();
  if (!input) return '';
  // Add scheme if missing for URL parsing
  let s = input;
  if (!/^https?:\/\//i.test(s)) s = 'http://' + s;
  try {
    const u = new URL(s);
    let host = u.hostname.toLowerCase();
    // Remove www.
    if (host.startsWith('www.')) host = host.slice(4);
    return host;
  } catch {
    // fallback: strip scheme and path manually
    let h = input.replace(/^https?:\/\//i,'').replace(/\/.*$/,'').toLowerCase();
    if (h.startsWith('www.')) h = h.slice(4);
    return h;
  }
}

function parseInputs(raw) {
  // Split by newlines, commas, whitespace
  return raw.split(/[\n,\s]+/).map(s => s.trim()).filter(Boolean);
}

function doCheck() {
  const raw = document.getElementById('inputBox').value;
  const tokens = parseInputs(raw);
  if (!tokens.length) return;

  const tbody = document.getElementById('resultBody');
  tbody.innerHTML = '';

  let hits = 0, misses = 0;

  tokens.forEach((tok, i) => {
    const domain = extractDomain(tok);
    if (!domain) return;
    const rec = DOMAIN_MAP[domain];
    const isHit = !!rec;
    if (isHit) hits++; else misses++;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i+1}</td>
      <td class="input-url">${escHtml(tok)}</td>
      <td class="domain-cell">${escHtml(domain)}</td>
      <td><span class="badge ${isHit ? 'hit' : 'miss'}">${isHit ? '⚠️ 已蒐證' : '✅ 未收錄'}</span></td>
      <td>${isHit ? '<span class="tld-pill">.' + escHtml(rec.tld) + '</span>' : '—'}</td>
      <td class="reg-text">${isHit ? escHtml(rec.registrar) : '—'}</td>
      <td class="date-text">${isHit ? escHtml(rec.date.slice(0,10)) : '—'}</td>
    `;
    if (isHit) tr.style.background = '#fff8f6';
    tbody.appendChild(tr);
  });

  document.getElementById('cntTotal').textContent = tokens.length;
  document.getElementById('cntHit').textContent = hits;
  document.getElementById('cntMiss').textContent = misses;
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior:'smooth', block:'start'});
}

function doClear() {
  document.getElementById('inputBox').value = '';
  document.getElementById('results').style.display = 'none';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('inputBox').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) doCheck();
});
