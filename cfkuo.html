<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Kuo — 電子名片</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+TC:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:     #0d0d1a;
    --gold:    #b8975a;
    --gold2:   #d4b07a;
    --cream:   #f5f0e8;
    --slate:   #1a1f2e;
    --steel:   #2c3450;
    --fog:     #8891a8;
    --w: 420px;
    --h: 240px;
  }

  html, body {
    height: 100%;
    background: #0a0b10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
    overflow: hidden;
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(184,151,90,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(184,151,90,.06) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .hint {
    color: var(--fog);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    opacity: .7;
    user-select: none;
  }

  /* ── card scene ── */
  .scene {
    width: var(--w);
    height: var(--h);
    perspective: 1200px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .75s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }
  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* ══ FRONT ══════════════════════════════════════════ */
  .front {
    background: var(--slate);
    border: 1px solid rgba(184,151,90,.25);
    box-shadow:
      0 0 0 1px rgba(184,151,90,.08),
      0 24px 60px rgba(0,0,0,.7),
      inset 0 1px 0 rgba(255,255,255,.05);
    display: flex;
    align-items: stretch;
  }

  /* left gold accent bar */
  .front::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, transparent, var(--gold) 30%, var(--gold2) 70%, transparent);
  }

  .front-body {
    flex: 1;
    padding: 32px 28px 28px 36px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .front-top {}

  .name-en {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 30px;
    letter-spacing: .06em;
    color: var(--cream);
    line-height: 1;
  }
  .name-zh {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: .3em;
    margin-top: 4px;
    opacity: .85;
  }

  .phd-title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--cream);
    letter-spacing: .12em;
    margin-top: 3px;
    opacity: .8;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin: 16px 0;
  }

  .email-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    color: var(--fog);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .email-addr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--gold2);
    letter-spacing: .04em;
  }

  .front-qr {
    width: 90px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 0 20px 16px 8px;
    gap: 6px;
  }
  .front-qr img {
    width: 72px;
    height: 72px;
    border-radius: 4px;
    border: 1px solid rgba(184,151,90,.3);
    padding: 3px;
    background: white;
  }
  .front-qr span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--fog);
    letter-spacing: .1em;
    text-align: center;
    line-height: 1.4;
  }

  /* corner decoration */
  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--gold);
    border-style: solid;
    opacity: .4;
  }
  .corner.tl { top: 12px; left: 16px; border-width: 1px 0 0 1px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  /* ══ BACK ════════════════════════════════════════════ */
  .back {
    transform: rotateY(180deg);
    background: var(--cream);
    border: 1px solid rgba(184,151,90,.3);
    box-shadow:
      0 24px 60px rgba(0,0,0,.7),
      inset 0 1px 0 rgba(255,255,255,.8);
    display: flex;
    align-items: stretch;
  }

  /* top gold bar */
  .back::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold2) 70%, transparent);
  }

  /* subtle noise texture */
  .back::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: .5;
    pointer-events: none;
  }

  .back-body {
    flex: 1;
    padding: 30px 24px 28px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  .eval {
    font-size: 11px;
    color: var(--fog);
    letter-spacing: .02em;
    font-weight: 300;
  }

  .specialty-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .25em;
    color: var(--fog);
    text-transform: uppercase;
  }

  .specialty {
    font-family: 'Noto Serif TC', serif;
    font-weight: 400;
    font-size: 16px;
    color: var(--slate);
    line-height: 1.5;
    letter-spacing: .08em;
  }

  .back-divider {
    width: 32px;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .url-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--fog);
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .url-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--steel);
    letter-spacing: .02em;
    word-break: keep-all;
    overflow-wrap: anywhere;
    line-height: 1.5;
  }

  .back-qrs {
    flex-shrink: 0;
    align-self: stretch;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px 12px 4px;
    position: relative;
    z-index: 1;
  }
  .back-qr-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .back-qr-item img {
    width: 58px;
    height: 58px;
    border-radius: 4px;
    border: 1px solid rgba(44,52,80,.2);
    padding: 2px;
    background: white;
  }
  .back-qr-item span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--fog);
    letter-spacing: .08em;
    text-align: center;
    line-height: 1.3;
  }

  .back-corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: var(--gold);
    border-style: solid;
    opacity: .5;
    z-index: 1;
  }
  .back-corner.tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .back-corner.br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  /* ── responsive ── */
  @media (max-width: 460px) {
    :root { --w: 340px; --h: 200px; }
    .name-en { font-size: 30px; }
    .front-body { padding: 24px 16px 20px 26px; }
    .front-qr { padding: 0 14px 0 4px; }
    .front-qr img { width: 60px; height: 60px; }
    .back-body { padding: 24px 16px 20px 24px; }
    .back-qrs { gap: 6px; padding: 0 8px 0 4px; }
    .back-qr-item img { width: 52px; height: 52px; }
    .specialty { font-size: 13px; }
    .url-val { font-size: 9.5px; }
  }

  @media (max-width: 360px) {
    :root { --w: 300px; --h: 185px; }
    .name-en { font-size: 26px; }
  }
</style>
</head>
